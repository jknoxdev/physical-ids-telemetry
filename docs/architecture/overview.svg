@startuml overview
!pragma layout smetana
allowmixing

skinparam {
    BackgroundColor #1a1a2e
    ArrowColor #7EC8E3
    ArrowFontColor #CCCCCC
    ArrowFontSize 10
    DefaultFontName Arial
    DefaultFontColor #E0E0E0
    DefaultFontSize 11
    StateBorderColor #4A90D9
    StateBorderThickness 2
    StateBackgroundColor #0f3460
    StateFontColor #FFFFFF
    StateFontSize 12
    StateAttributeFontColor #AAAAAA
    StateAttributeFontSize 10
    NoteBackgroundColor #0D2818
    NoteBorderColor #27AE60
    NoteFontColor #AAAAAA
    NoteFontSize 10
    PackageBorderColor #4A90D9
    PackageBackgroundColor #0f1a2e
    PackageFontColor #7EC8E3
    PackageFontSize 13
}

title <size:18><color:#7EC8E3><b>L.I.M.A. Node - - System Overview</b></color></size>

package "LIMA Node" {
    state "Sensors" as sensors #0D3320
    state "Event Detection" as detect #2a1a0a
    state "FSM (State Machine)" as fsm #1a3060
    state "Signed Event Record" as packet #2a1a4a
    state "BLE Transport" as ble #0f3460
}

state "Gateway" as gw #0a1a3a
state "MQTT / Storage / Alerts" as backend #1a2a1a

sensors - -> detect : sensor IRQ /\nthreshold breach
detect - -> fsm : lima_event_t\nposted to queue
fsm - -> packet : ECDSA-P256\nsign payload
packet - -> ble : advertise\nsigned packet
ble - -> gw : BLE advertisement
gw - -> backend : MQTT publish /\nstore / alert

note right of fsm
  <color:#27AE60>BOOT -> CALIBRATING
  -> ARMED -> SLEEP
  -> EVENT_DETECTED
  -> SIGNING -> TX</color>
end note

note right of gw
  <color:#27AE60>Silence = alert
  gateway detects
  node dropout</color>
end note

@enduml

