# Core Kernel Features
CONFIG_GPIO=y

# Logging
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
# Error     1   LOG_ERR
# Warning   2   LOG_ERR, LOG_WRN
# Info      3   LOG_ERR, LOG_WRN, LOG_INF
# Debug     4   LOG_ERR, LOG_WRN, LOG_INF, LOG_DBG
CONFIG_LOG_MODE_DEFERRED=y

# I2C
CONFIG_I2C=y
CONFIG_I2C_LOG_LEVEL_DBG=y

# Sensors
CONFIG_SENSOR=y
CONFIG_MPU6050=y
CONFIG_BME280=y
CONFIG_LIMA_BARO_THRESHOLD_PA=5
CONFIG_BME280_FILTER_OFF=y

# Stack protection / fault dumps
CONFIG_FAULT_DUMP=2
CONFIG_HW_STACK_PROTECTION=y
CONFIG_MPU_STACK_GUARD=y

# FPU for sqrt/math
CONFIG_FPU=y

# Heap and workqueue
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=4096

# Power Management — PM_DEVICE only, CONFIG_PM not supported on this board
# CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_LIMA_DEEP_SLEEP_INTERVAL_MS=6000

# Crypto — Oberon PSA driver (software, volatile keys for v1)
CONFIG_NRF_SECURITY=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
# CONFIG_NRF_CC3XX_PLATFORM=y
CONFIG_PSA_CRYPTO_DRIVER_OBERON=y
CONFIG_PSA_WANT_GENERATE_RANDOM=y
CONFIG_PSA_WANT_ALG_CTR_DRBG=y
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_ALG_SHA_256=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
# CONFIG_MBEDTLS_PSA_CRYPTO_KEY_ID_ENCODES_OWNER=n


# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LIMA_NODE_01"

# Persistent storage
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS_LOOKUP_CACHE=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y


# CONFIG_TRUSTED_STORAGE=y
# CONFIG_TRUSTED_STORAGE_BACKEND_FLASH=y
# CONFIG_TRUSTED_STORAGE_STORAGE_PREFIX="lima"
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y


# PSA persistent key storage — backed by settings_storage via NVS
# CONFIG_MBEDTLS_PSA_CRYPTO_STORAGE_C=y
# CONFIG_PSA_ITS_FLASH=y

CONFIG_WATCHDOG=y
CONFIG_WDT_NRFX=y

CONFIG_SETTINGS_RUNTIME=y



# CONFIG_PSA_INTERNAL_TRUSTED_STORAGE=y
# CONFIG_TRUSTED_STORAGE_STORAGE_BACKEND_SETTINGS=y
# CONFIG_TRUSTED_STORAGE_BACKEND_AEAD=y
# CONFIG_TRUSTED_STORAGE_BACKEND_AEAD_KEY_HASH_UID=y

# used for storage backend for keys when on flash
# CONFIG_PSA_WANT_KEY_TYPE_CHACHA20=y
# CONFIG_PSA_WANT_ALG_CHACHA20_POLY1305=y

# CONFIG_PSA_CRYPTO_STORAGE_BACKEND_ITS=y


# PSA persistent key storage — Zephyr secure storage subsystem
CONFIG_SECURE_STORAGE=y

# CONFIG_TRUSTED_STORAGE=y          ← remove
# CONFIG_MBEDTLS_PSA_CRYPTO_STORAGE_C=y  ← remove (selected automatically)
# CONFIG_PSA_INTERNAL_TRUSTED_STORAGE=y  ← remove
# CONFIG_TRUSTED_STORAGE_BACKEND_AEAD=y  ← remove
# CONFIG_TRUSTED_STORAGE_BACKEND_AEAD_KEY_HASH_UID=y  ← remove
# CONFIG_TRUSTED_STORAGE_STORAGE_BACKEND_SETTINGS=y  ← remove
# CONFIG_PSA_WANT_KEY_TYPE_CHACHA20=y  ← remove
# CONFIG_PSA_WANT_ALG_CHACHA20_POLY1305=y  ← remove